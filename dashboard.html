<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <!-- Título -->
  <title>Dashboard | BarberFlow</title>
  <!-- CSS do dashboard -->
  <link rel="stylesheet" href="./css/dashboard.css" />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

</head>

<body>
  <!-- =========================
       HEADER
  ========================== -->
  <header class="dashboard-header">

    <div class="container">

      <h1>
        BarberFlow Dashboard
      </h1>

      <a href="index.html">
        Voltar ao site
      </a>

    </div>

  </header>

  <!-- =========================
     ESTATÍSTICAS
  ========================== -->

  <section class="stats-section container">

    <!-- Card -->
    <div class="stat-card">

      <h3>
        Total
      </h3>

      <span id="total-stat">
        0
      </span>

    </div>

    <!-- Card -->
    <div class="stat-card">

      <h3>
        Agendados
      </h3>

      <span id="scheduled-stat">
        0
      </span>

    </div>

    <!-- Card -->
    <div class="stat-card">

      <h3>
        Em andamento
      </h3>

      <span id="progress-stat">
        0
      </span>

    </div>

    <!-- Card -->
    <div class="stat-card">

      <h3>
        Finalizados
      </h3>

      <span id="finished-stat">
        0
      </span>

    </div>

  </section>
  <!-- =========================
       CONTEÚDO PRINCIPAL
  ========================== -->
  <main class="dashboard container">

    <!-- =========================
         FORMULÁRIO
    ========================== -->
    <section class="form-section">

      <h2>
        Novo Agendamento
      </h2>

      <!-- Formulário -->
      <form id="appointment-form">

        <!-- Nome -->
        <input
          type="text"
          id="client-name"
          placeholder="Nome do cliente"
          required
        />

        <!-- Serviço -->
        <select id="service" required>

          <option value="">
            Selecione um serviço
          </option>

          <option value="Corte">
            Corte
          </option>

          <option value="Barba">
            Barba
          </option>

          <option value="Corte + Barba">
            Corte + Barba
          </option>

        </select>

        <!-- Data -->
        <input
          type="date"
          id="date"
          required
        />

        <!-- Horário -->
        <input
          type="time"
          id="time"
          required
        />

        <!-- Botão -->
        <button type="submit">
          Agendar
        </button>

      </form>

    </section>

    <!-- =========================
     CALENDÁRIO
    ========================== -->

    <section class="calendar-section">

      <div class="calendar-header">

        <h2>
          Agenda Visual
        </h2>

      </div>

      <!-- Calendário -->
      <div id="calendar">

      </div>

    </section>

    <!-- =========================
     LISTA DE AGENDAMENTOS
    ========================== -->
    <section class="appointments-section">

      <!-- Topo da seção -->
      <div class="appointments-header">

        <h2>
          Agendamentos
        </h2>

        <!-- Filtro -->
        <select id="status-filter">

          <option value="Todos">
            Todos
          </option>

          <option value="Agendado">
            Agendado
          </option>

          <option value="Em andamento">
            Em andamento
          </option>

          <option value="Finalizado">
            Finalizado
          </option>

        </select>

        <!-- Busca -->
        <input
          type="text"
          id="search-input"
          placeholder="Buscar cliente..."
        />

      </div>

      <!-- Lista dos cards -->
      <div id="appointments-list">

      </div>

    </section>

  </main>

  <!-- =========================
    TOAST NOTIFICATION
  ========================== -->

  <div id="toast">

  </div>

  <!-- =========================
     FULLCALENDAR CSS
  ========================== -->

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"
  />

  <!-- =========================
    FULLCALENDAR JS
  ========================== -->

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <!-- Scripts -->
  <script src="./js/storage.js"></script>
  <script src="./js/dashboard.js"></script>

</body>
</html>
