<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <!-- Título -->
  <title>Dashboard | BarberFlow</title>
  <!-- CSS do dashboard -->
  <link rel="stylesheet" href="./css/dashboard.css" />

</head>

<body>
  <!-- =========================
       HEADER
  ========================== -->
  <header class="dashboard-header">

    <div class="container">

      <h1>
        BarberFlow Dashboard
      </h1>

      <a href="index.html">
        Voltar ao site
      </a>

    </div>

  </header>
  <!-- =========================
       CONTEÚDO PRINCIPAL
  ========================== -->
  <main class="dashboard container">

    <!-- =========================
         FORMULÁRIO
    ========================== -->
    <section class="form-section">

      <h2>
        Novo Agendamento
      </h2>

      <!-- Formulário -->
      <form id="appointment-form">

        <!-- Nome -->
        <input
          type="text"
          id="client-name"
          placeholder="Nome do cliente"
          required
        />

        <!-- Serviço -->
        <select id="service" required>

          <option value="">
            Selecione um serviço
          </option>

          <option value="Corte">
            Corte
          </option>

          <option value="Barba">
            Barba
          </option>

          <option value="Corte + Barba">
            Corte + Barba
          </option>

        </select>

        <!-- Data -->
        <input
          type="date"
          id="date"
          required
        />

        <!-- Horário -->
        <input
          type="time"
          id="time"
          required
        />

        <!-- Botão -->
        <button type="submit">
          Agendar
        </button>

      </form>

    </section>

    <!-- =========================
     LISTA DE AGENDAMENTOS
    ========================== -->
    <section class="appointments-section">

      <!-- Topo da seção -->
      <div class="appointments-header">

        <h2>
          Agendamentos
        </h2>

        <!-- Filtro -->
        <select id="status-filter">

          <option value="Todos">
            Todos
          </option>

          <option value="Agendado">
            Agendado
          </option>

          <option value="Em andamento">
            Em andamento
          </option>

          <option value="Finalizado">
            Finalizado
          </option>

        </select>

      </div>

      <!-- Lista dos cards -->
      <div id="appointments-list">

      </div>

    </section>

  </main>

  <!-- =========================
    TOAST NOTIFICATION
  ========================== -->

  <div id="toast">

  </div>

  <!-- Scripts -->
  <script src="./js/storage.js"></script>
  <script src="./js/dashboard.js"></script>

</body>
</html>
